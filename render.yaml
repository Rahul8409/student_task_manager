services:
  - type: web
    name: student-task-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:///database/student_tasks.db
